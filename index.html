<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasičský portál | OSŠP Kolín</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Specifické styly pro tento efekt (můžeš pak přesunout do style.css) */
        .hero-full {
            height: 100vh; /* Celá výška obrazovky */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135px, #fff5f2 0%, #ffffff 100%);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            text-align: center;
            animation: bounce 2s infinite;
            color: var(--fire-red);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        .intro-bubble {
            background: white;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            max-width: 900px;
            margin: -50px auto 50px auto; /* Vytáhne bublinu trochu nahoru nad karty */
            position: relative;
            z-index: 10;
            border-left: 8px solid var(--fire-red);
        }
    </style>
</head>
<body>


    <header class="hero-full">
        <h1 style="font-size: 3rem; margin-bottom: 20px;">Studijní portál</h1>
        <p style="font-size: 1.3rem; max-width: 700px; color: var(--text-muted);">
            Makám na tom
        </p>
        
        <a href="#obsah" class="scroll-indicator">
            <p>Přejít k materiálům</p>
            <i class="fa-solid fa-chevron-down" style="font-size: 2rem;"></i>
        </a>
    </header>


            
            </div>
    </main>

    <footer>
        <p>&copy; :D</p>
    </footer>

    <script>
        // Smooth scroll pro tu šipku
        document.querySelector('.scroll-indicator').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('#obsah').scrollIntoView({ behavior: 'smooth' });
        });

        // Hamburger menu script
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = hamburger.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-xmark');
        });
    </script>
</body>
</html>
